  <text x="600" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="white" text-anchor="middle">AluminIA</text>
  
  <!-- Tagline -->
  <text x="600" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="400" fill="#94a3b8" text-anchor="middle">Tranquilidad DIAN. Decisiones con datos. Siigo conectado.</text>
  
  <!-- Accent line -->
  <rect x="450" y="370" width="300" height="3" rx="1.5" fill="#2dd4bf" opacity="0.6"/>
  
