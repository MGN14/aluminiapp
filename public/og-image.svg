  <rect x="575" y="420" width="50" height="4" fill="#003893"/>
  <rect x="630" y="420" width="50" height="4" fill="#ce1126"/>
  
  <!-- Subtitle -->
  <text x="600" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="400" fill="#64748b" text-anchor="middle">Conciliación bancaria • Facturación DIAN • Coach IA • Bancolombia y +6 bancos</text>
