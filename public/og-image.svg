  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#grad1)"/>
  
  <!-- Icon container -->
  <rect x="490" y="180" width="80" height="80" rx="16" fill="#2dd4bf"/>
  
  <!-- Document icon -->
  <path d="M515 205 L555 205 L555 255 L515 255 Z" fill="white" stroke="none"/>
  <path d="M520 215 L550 215" stroke="#0f172a" stroke-width="2"/>
  <path d="M520 225 L545 225" stroke="#0f172a" stroke-width="2"/>
  <path d="M520 235 L550 235" stroke="#0f172a" stroke-width="2"/>
  <path d="M520 245 L540 245" stroke="#0f172a" stroke-width="2"/>
  
